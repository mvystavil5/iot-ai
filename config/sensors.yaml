# Sensor registry — every sensor the system knows about.
# Add new sensors here before they start posting data.
#
# interface: wifi — readings arrive via HTTP POST /telemetry sent by wifi_bridge.py
#                   running on the QRB2210 MPU (Debian Linux side of the Arduino UNO Q).
#                   The STM32U585 MCU reads GPIO and passes frames to the MPU via
#                   Arduino Bridge RPC; the MPU posts over Wi-Fi 5 (WCBN3536A).
# interface: http — readings arrive via POST /telemetry from any other HTTP client

interfaces:
  wifi:
    transport: http_post          # MPU posts SenML JSON to POST /telemetry
    wifi_standard: "802.11ac"    # Wi-Fi 5, dual-band 2.4/5 GHz
    source: qrb2210_mpu          # wifi_bridge.py running on-board
    mcu_link: arduino_bridge_rpc # MCU→MPU internal channel

sensors:
  - id: temp_01
    name: "Living room temperature"
    type: temperature
    unit: C
    location: "living_room"
    expected_range: [-10, 50]
    reporting_interval_s: 30
    interface: wifi
    hardware: { board: "Arduino UNO Q", model: DHT11, mcu_pin: D4 }

  - id: humid_01
    name: "Living room humidity"
    type: humidity
    unit: "%RH"
    location: "living_room"
    expected_range: [0, 100]
    reporting_interval_s: 30
    interface: wifi
    hardware: { board: "Arduino UNO Q", model: DHT11, mcu_pin: D4 }   # same chip as temp_01

  - id: co2_01
    name: "Living room CO2 (air quality proxy)"
    type: co2
    unit: ppm
    location: "living_room"
    expected_range: [300, 5000]
    reporting_interval_s: 30
    interface: wifi
    hardware: { board: "Arduino UNO Q", model: MQ-135, mcu_pin: A0, note: "uncalibrated proxy — replace with MH-Z19B for accurate PPM" }

  - id: motion_01
    name: "Living room motion"
    type: motion
    unit: bool
    location: "living_room"
    expected_range: [0, 1]
    reporting_interval_s: 30             # periodic; also fires immediately on state change
    interface: wifi
    hardware: { board: "Arduino UNO Q", model: HC-SR501, mcu_pin: D7 }
