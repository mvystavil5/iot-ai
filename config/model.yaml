# Model and knowledge store configuration.
# Swap backends here — no code changes needed.

embedding:
  model: nomic-embed-text        # Ollama-served; swap to text-embedding-3-small for prod
  dim: 768
  batch_size: 32

vector_store:
  backend: chromadb              # swap to qdrant for multi-node
  path: ./data/chroma
  collection: iot_knowledge
  max_chunks: 50000
  eviction_policy: oldest_not_referenced

llm:
  backend: ollama                # swap to claude-api for higher quality
  model: smollm2:135m            # fits in 4 GB RAM (Arduino UNO Q); swap to phi3:mini or claude-haiku-4-5-20251001 for more capable hardware
  temperature: 0.2
  max_tokens: 512
  system_prompt: >
    You are a physical-world reasoning system analyzing IoT sensor data.
    Answer concisely and always state your confidence (0.0–1.0).
    Ground answers in the provided sensor context. Never hallucinate sensor values.

rag:
  top_k: 8
  min_similarity: 0.3
  rerank: false                  # set true to add cross-encoder reranking
  recency_decay_hours: 24.0      # half-life for recency score; reduce for fast-changing sensors
  confidence_weights:
    coverage: 0.25               # fraction of top_k slots filled
    similarity: 0.40             # mean cosine similarity of retrieved chunks
    recency: 0.20                # exponential decay by chunk age
    consistency: 0.15            # intra-sensor value agreement

beliefs:
  path: ./data/beliefs.jsonl
  invalidation_threshold: 0.7   # new belief must have confidence > this to invalidate old

security:
  # Occupancy-anomaly detection — see src/security/. Learns one aggregate
  # baseline of "normal occupancy" for the space (never a profile of any
  # named individual) and flags live activity that doesn't resemble it as
  # a potential intrusion; never raw biometrics, never presented as a
  # verdict about who is present — only a similarity-scored expected/
  # anomalous read.
  anomaly_similarity_threshold: 0.6   # below this, live activity is flagged "anomalous"
  live_window_minutes: 30             # recent-history window used to build the live signature
  feature_weights:
    hourly_activity: 0.5              # cosine similarity of 24-bucket activity histograms
    presence_ratio: 0.3               # closeness of overall active-fraction
    session_length: 0.2               # closeness of mean contiguous-activity duration

wellness:
  # Personal activity self-experiment — see src/wellness/. Strictly opt-in
  # and single-person: run by you, on yourself, to see whether the board's
  # existing motion sensor can say anything useful about movement vs.
  # stillness over time. Derives daily summaries (active/sedentary minutes,
  # longest still streak, movement sessions) and flags shifts worth a look —
  # informational only, never a diagnosis, never shared or compared between
  # people, never leaves the board (data/wellness_*.jsonl).
  recent_window_days: 7        # "how have the last week's recorded days looked"
  baseline_window_days: 21     # ...compared against this many recorded days before that
  min_days_per_window: 3       # below this on either side, report insufficient_data rather than guess
  trend_alert_minutes: 30.0    # average daily delta (minutes) that counts as a notable shift

lora:
  rank: 8
  alpha: 16
  dropout: 0.05
  target_modules: [q_proj, v_proj]
  task_type: CAUSAL_LM

training:
  labeled_examples_path: ./data/labeled_examples.jsonl
  trigger_threshold: 50          # min examples before auto-training
  batch_size: 4
  gradient_accumulation: 4
  learning_rate: 2.0e-4
  warmup_steps: 10
  max_steps: 200
  checkpoint_dir: ./checkpoints
  keep_last_n: 3
  sync:
    enabled: false                       # Phase 1 default: off until a training host is provisioned
    host: "http://training-host:8100"   # base URL of the offline/cloud training service
    push_batch_size: 50                  # new labeled examples per export batch
    poll_interval_s: 1800                # how often the board checks for a newer adapter
